version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: libreria_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: libreria_inventario
      MYSQL_USER: libreria_user
      MYSQL_PASSWORD: libreria_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: libreria_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: libreria_user
      DB_PASSWORD: libreria_pass
      DB_DATABASE: libreria_inventario
      JWT_SECRET: libreria_super_secret_jwt_2024
      JWT_EXPIRES_IN: 8h
      PORT: 3001
      FRONTEND_URL: http://localhost
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: libreria_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
