apiVersion: apps/v1
kind: Deployment
metadata:
  name: libreria-backend
  namespace: libreria
spec:
  replicas: 2
  selector:
    matchLabels:
      app: libreria-backend
  template:
    metadata:
      labels:
        app: libreria-backend
    spec:
      containers:
        - name: backend
          image: libreria-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: libreria-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: libreria-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: libreria-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /api/categories
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: libreria-backend
  namespace: libreria
spec:
  selector:
    app: libreria-backend
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
